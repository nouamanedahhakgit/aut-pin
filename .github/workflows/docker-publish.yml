name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - service: orchestrator
            image: aut-pin-orchestrator
            context: ./orchestrator
            dockerfile: ./orchestrator/Dockerfile

          - service: multi-domain-clean
            image: aut-pin-multi-domain-clean
            context: ./multi-domain-clean
            dockerfile: ./multi-domain-clean/Dockerfile

          - service: pin_generator
            image: aut-pin-pin_generator
            context: .
            dockerfile: ./pin_generator/Dockerfile

          - service: articles-website-generator
            image: aut-pin-articles-website-generator
            context: .
            dockerfile: ./articles-website-generator/Dockerfile

          - service: website-parts-generator
            image: aut-pin-website-parts-generator
            context: ./website-parts-generator
            dockerfile: ./website-parts-generator/Dockerfile

          - service: llamacpp_manager
            image: aut-pin-llamacpp_manager
            context: .
            dockerfile: ./llamacpp_manager/Dockerfile

          - service: updater
            image: aut-pin-updater
            context: ./multi-domain-clean/updater
            dockerfile: ./multi-domain-clean/updater/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: https://index.docker.io/v1/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
