<!DOCTYPE html><html><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Luxe Recipe - Pin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
/* Glassmorphism Luxe Recipe */
* { margin: 0; padding: 0; box-sizing: border-box; }
.pin-container { width: 600px; height: 1067px; position: relative; overflow: hidden; background: #000; font-family: Arial,sans-serif; }

/* Images */
.background { position:absolute; top:0px; left:0px; width:600px; height:1067px; object-fit:cover; z-index:1; }
.top-image { position:absolute; top:60px; left:60px; width:480px; height:480px; object-fit:cover; z-index:2; border-radius:240px; border:4px solid rgba(255,255,255,0.2); box-shadow:0 20px 40px rgba(0,0,0,0.4); }

/* Elements */
.glass-card { position:absolute; top:580px; left:40px; width:520px; height:420px; z-index:10; background:rgba(255, 255, 255, 0.05); border:1px solid rgba(255, 255, 255, 0.1); border-radius:32px; box-shadow:0 8px 32px 0 rgba(0, 0, 0, 0.37); backdrop-filter:blur(20px); }
.badge { position:absolute; top:610px; left:80px; width:160px; height:32px; font-family:Montserrat; font-size:12px; font-weight:bold; color:#fff; text-align:center; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:20; letter-spacing:1px; background-color:#E1306C; border-radius:16px; }
.title { position:absolute; top:660px; left:80px; width:440px; height:160px; font-family:Playfair Display; font-size:52px; font-weight:900; color:#fff; text-align:left; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:20; line-height:1.1; text-shadow:0 4px 8px rgba(0,0,0,0.3); }
.stars { position:absolute; top:840px; left:80px; display:flex; gap:4px; z-index:20; }
.stars svg { width:24px; height:24px; }
.website-bar { position:absolute; top:1020px; left:0px; width:600px; height:47px; font-family: Montserrat; font-size:16px; font-weight:600; color:rgba(255,255,255,0.7); text-align:center; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:20; letter-spacing:2px; }
</style>
</head><body>
  <div class="pin-container">
  <img class="background" src="" alt="Background">
  <img class="top-image" src="" alt="Top Image">
  <div class="glass-card"></div>

Roast Duck</div>
