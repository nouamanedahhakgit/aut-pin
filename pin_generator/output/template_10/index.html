<!DOCTYPE html><html><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rustic Italian Pasta Pin - Pin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
/* Rustic Italian Pasta Pin */
* { margin: 0; padding: 0; box-sizing: border-box; }
.pin-container { width: 600px; height: 1067px; position: relative; overflow: hidden; background: #FFF; font-family: Arial,sans-serif; }

/* Images */
.main-image { position:absolute; top:0px; left:0px; width:600px; height:700px; object-fit:cover; z-index:1; }
.background { position:absolute; top:700px; left:0px; width:600px; height:367px; object-fit:cover; z-index:1; }

/* Elements */
.text-area { position:absolute; top:700px; left:0px; width:600px; height:367px; z-index:5; background-color:#F9F5F0; }
.badge { position:absolute; top:740px; left:150px; width:300px; height:40px; font-family:Georgia, serif; font-size:18px; font-weight:900; color:#2D6A4F; text-align:center; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:10; letter-spacing:2px; border:2px solid #2D6A4F; border-radius:20; padding:0 20px; }
.title { position:absolute; top:790px; left:50px; width:500px; height:100px; font-family:Playfair Display, serif; font-size:42px; font-weight:bold; color:#1A1A1A; text-align:center; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:10; line-height:1.1; }
.description { position:absolute; top:890px; left:60px; width:480px; height:60px; font-family:Georgia, serif; font-size:18px; font-weight:normal; color:#4A4A4A; text-align:center; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:10; font-style:italic; }
.website { position:absolute; top:980px; left:0px; width:600px; height:40px; font-family:Inter, sans-serif; font-size:14px; font-weight:bold; color:#2D6A4F; text-align:center; display:flex; align-items:center; justify-content:center; flex-direction:column; overflow:hidden; word-break:break-word; z-index:10; text-transform:uppercase; letter-spacing:3px; }
</style>
</head><body>
  <div class="pin-container">
  <img class="main-image" src="https://images.unsplash.com/photo-1473093226795-af9932fe5856?auto=format&fit=crop&q=80&w=600&h=700" alt="Main Image">
  <img class="background" src="" alt="Background">
  <div class="text-area"></div>
  <div class="badge">MUST TRY</div>
  <div class="title">Homemade Basil Pesto Pasta</div>
  <div class="description">Fresh garden basil blended with toasted pine nuts and olive oil.</div>
  <div class="website">www.yourkitchenmasters.com</div>
  </div>
</body></html>
