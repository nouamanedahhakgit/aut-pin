# Aut-Pin Docker Hub Deployment
# Pre-built images from Docker Hub with orchestrator setup wizard.
#
# Quick start:
#   docker compose -f docker-compose.hub.yml up orchestrator
#   → Open http://localhost:9000 → configure DB, URLs, API keys → Save
#   docker compose -f docker-compose.hub.yml up -d
#
# All services communicate via Docker network (service names as hostnames).
# Labels enable Watchtower auto-update (see deploy-to-server-docker-hub.md).

services:
  # ─── Orchestrator Setup Wizard (starts first) ────────────────────
  orchestrator:
    image: ${DOCKERHUB_USERNAME:-boarddash31}/aut-pin-orchestrator:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6005:5005"
    volumes:
      - env-config:/app/env-output
    environment:
      - ENV_OUTPUT_DIR=/app/env-output

  # ─── Main Admin UI & Controller ──────────────────────────────────
  multi-domain-clean:
    image: ${DOCKERHUB_USERNAME:-boarddash31}/aut-pin-multi-domain-clean:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6001:5001"
    environment:
      - GENERATE_ARTICLE_API_URL=http://articles-website-generator:5002
      - WEBSITE_PARTS_API_URL=http://website-parts-generator:5003
      - PIN_API_URL=http://pin_generator:5000
      - LLAMACPP_MANAGER_URL=http://llamacpp_manager:5004
      - PIN_EDITOR_URL=http://llamacpp_manager:5004
      - ARTICLE_GENERATORS_DIR=/app/shared/generators
      - STATIC_PROJECT_OUTPUT_DIR=/app/output/static-projects
    volumes:
      - ./output/static-projects:/app/output/static-projects
      - ./articles-website-generator/generators:/app/shared/generators
      - env-config:/app/env-config:ro
    env_file:
      - path: ./env-config/multi-domain-clean.env
        required: false
    depends_on:
      - pin_generator
      - articles-website-generator
      - website-parts-generator
      - llamacpp_manager

  # ─── Pin Generator ──────────────────────────────────────────────
  pin_generator:
    image: ${DOCKERHUB_USERNAME:-boarddash31}/aut-pin-pin_generator:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6000:5000"
    volumes:
      - pin_output:/app/output
      - env-config:/app/env-config:ro
    env_file:
      - path: ./env-config/pin_generator.env
        required: false

  # ─── Articles & Website Generator ───────────────────────────────
  articles-website-generator:
    image: ${DOCKERHUB_USERNAME:-boarddash31}/aut-pin-articles-website-generator:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6002:5002"
    environment:
      - LLAMACPP_MANAGER_URL=http://llamacpp_manager:5004
    volumes:
      - ./articles-website-generator/generators:/app/generators
      - env-config:/app/env-config:ro
    env_file:
      - path: ./env-config/articles-website-generator.env
        required: false
    depends_on:
      - llamacpp_manager

  # ─── Website Parts Generator ────────────────────────────────────
  website-parts-generator:
    image: ${DOCKERHUB_USERNAME:-boarddash31}/aut-pin-website-parts-generator:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6003:5003"
    volumes:
      - env-config:/app/env-config:ro
    env_file:
      - path: ./env-config/website-parts-generator.env
        required: false

  # ─── LlamaCpp Manager ──────────────────────────────────────────
  llamacpp_manager:
    image: ${DOCKERHUB_USERNAME:-boarddash31}/aut-pin-llamacpp_manager:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6004:5004"
    environment:
      - LLAMACPP_MODELS_DIR=/app/llamacpp_manager/models
      - LLAMACPP_DB_PATH=/app/llamacpp_manager/data/llamacpp_manager.db
    volumes:
      - llamacpp_models:/app/llamacpp_manager/models
      - llamacpp_data:/app/llamacpp_manager/data

volumes:
  env-config:
  pin_output:
  llamacpp_models:
  llamacpp_data:
